services:
  whisper-api:
    build: .
    ports:
      - "9000:9000"
    restart: unless-stopped
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3}
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=float16
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - whisper-models:/root/.cache/huggingface

volumes:
  whisper-models:
